# Training configuration.
# Sized for an overnight from-scratch run on the sample corpus (CPU NumPy).

model:
  emb_dim: 256
  context_length: 128
  num_heads: 8
  num_layers: 4
  hidden_mult: 4
  activation: gelu
  pos_type: learned
  dropout: 0.1        # some regularization for the longer run
  bias: true

train:
  batch_size: 12
  steps: 2500         # ~8s/step measured -> ~5.5h overnight run
  lr: 0.0006
  weight_decay: 0.01
  val_frac: 0.1
  eval_every: 100
  seed: 42
