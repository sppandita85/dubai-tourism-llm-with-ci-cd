# Training configuration.
# Model size is kept modest so a full NumPy (CPU) training run finishes quickly on a
# small corpus. Scale these up on a machine with PyTorch/GPU for real training.

model:
  emb_dim: 128
  context_length: 64
  num_heads: 4
  num_layers: 2
  hidden_mult: 4
  activation: gelu
  pos_type: learned
  dropout: 0.0        # 0 for a tiny corpus; raise when there is more data
  bias: true

train:
  batch_size: 12
  steps: 200
  lr: 0.0006
  weight_decay: 0.01
  val_frac: 0.1
  eval_every: 25
  seed: 42
